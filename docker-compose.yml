services:
  postgres:
    image: postgres:16-alpine
    container_name: redks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: redks
      POSTGRES_PASSWORD: redks_password
      POSTGRES_DB: redks
    ports:
      - "5432:5432"
    volumes:
      - redks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redks -d redks"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redks_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redks_postgres_data:
  redks_redis_data:
